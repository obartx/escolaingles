<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Winners Pro - Plataforma Educacional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-[#f8f9fc]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // Mocking Lucide Icons for standalone usage
        const Icon = ({ name, className = "w-5 h-5" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const App = () => {
            const [page, setPage] = useState('landing'); 
            const [user, setUser] = useState(null);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [regName, setRegName] = useState('');
            const [regEmail, setRegEmail] = useState('');
            const [regPass, setRegPass] = useState('');
            const [regType, setRegType] = useState('ALUNO');
            const [error, setError] = useState('');
            const [success, setSuccess] = useState('');

            const [database, setDatabase] = useState([
                { id: 'ADMIN_001', name: 'Administrador Principal', mail: 'cyber.admin@newwinners.com', pass: 'Nexus99#', type: 'ADMIN', date: '01/01/2024' }
            ]);

            useEffect(() => {
                setError('');
                setSuccess('');
                if (window.lucide) window.lucide.createIcons();
            }, [page]);

            const handleLogin = (e) => {
                e.preventDefault();
                const foundUser = database.find(u => u.mail === email && u.pass === password);
                if (foundUser) {
                    setUser(foundUser);
                    setPage('dashboard');
                } else {
                    setError("Credenciais inválidas. Verifique seu email e senha.");
                }
            };

            const handleRegister = (e) => {
                e.preventDefault();
                if (database.some(u => u.mail === regEmail)) {
                    setError("Este email já está registrado no sistema.");
                    return;
                }
                const newUser = {
                    id: Math.random().toString(36).substr(2, 9).toUpperCase(),
                    name: regName, mail: regEmail, pass: regPass, type: regType,
                    date: new Date().toLocaleDateString()
                };
                setDatabase(prev => [...prev, newUser]);
                setSuccess("Cadastro realizado com sucesso!");
                setTimeout(() => { setPage('login'); setEmail(regEmail); }, 2000);
            };

            const Sidebar = () => (
                <aside className="w-72 bg-white border-r border-gray-200 flex flex-col p-8 h-screen sticky top-0">
                    <div className="flex items-center space-x-3 mb-12">
                        <div className="bg-indigo-600 p-1.5 rounded-lg shadow-md flex items-center justify-center">
                            <Icon name="globe" className="text-white w-5 h-5" />
                        </div>
                        <span className="font-black text-indigo-900 tracking-tight text-xl text-nowrap">NW PRO</span>
                    </div>
                    <nav className="flex-1 space-y-2">
                        <div className="text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] mb-4 ml-2">Menu Principal</div>
                        <button className="flex items-center space-x-3 w-full p-3.5 rounded-xl bg-indigo-50 text-indigo-600 font-bold border border-indigo-100 shadow-sm">
                            <Icon name="layout-dashboard" />
                            <span>Dashboard</span>
                        </button>
                        {user?.type === 'ALUNO' && (
                            <React.Fragment>
                                <button className="flex items-center space-x-3 w-full p-3.5 rounded-xl text-gray-400 hover:bg-gray-50 transition-colors">
                                    <Icon name="play-circle" />
                                    <span>Minhas Aulas</span>
                                </button>
                                <button className="flex items-center space-x-3 w-full p-3.5 rounded-xl text-gray-400 hover:bg-gray-50 transition-colors">
                                    <Icon name="award" />
                                    <span>Certificados</span>
                                </button>
                            </React.Fragment>
                        )}
                        {user?.type === 'PROFESSOR' && (
                            <React.Fragment>
                                <button className="flex items-center space-x-3 w-full p-3.5 rounded-xl text-gray-400 hover:bg-gray-50 transition-colors">
                                    <Icon name="users" />
                                    <span>Minhas Turmas</span>
                                </button>
                                <button className="flex items-center space-x-3 w-full p-3.5 rounded-xl text-gray-400 hover:bg-gray-50 transition-colors">
                                    <Icon name="file-text" />
                                    <span>Materiais</span>
                                </button>
                            </React.Fragment>
                        )}
                    </nav>
                    <div className="mt-auto p-4 bg-gray-50 rounded-2xl border border-gray-100 mb-6">
                        <div className="flex items-center space-x-3">
                            <div className={`w-10 h-10 rounded-full flex items-center justify-center font-bold text-white ${user?.type === 'ADMIN' ? 'bg-indigo-600' : 'bg-blue-600'}`}>
                                {user?.name[0]}
                            </div>
                            <div className="overflow-hidden">
                                <p className="text-sm font-bold text-gray-900 truncate">{user?.name}</p>
                                <p className="text-[10px] text-gray-500 font-semibold">{user?.type}</p>
                            </div>
                        </div>
                    </div>
                    <button onClick={() => setPage('landing')} className="flex items-center space-x-3 text-red-400 hover:text-red-600 p-3 font-bold transition-colors">
                        <Icon name="log-out" />
                        <span>Sair</span>
                    </button>
                </aside>
            );

            if (page === 'landing') {
                return (
                    <div className="min-h-screen bg-[#0a0a0f] text-white flex flex-col">
                        <nav className="flex justify-between items-center p-6 w-full z-50">
                            <div className="flex items-center space-x-2">
                                <div className="bg-indigo-600 p-2 rounded-lg"><Icon name="globe" /></div>
                                <span className="text-white font-bold text-xl uppercase">New Winners <span className="text-indigo-400">Pro</span></span>
                            </div>
                            <div className="space-x-4">
                                <button onClick={() => setPage('login')} className="text-gray-300 hover:text-white font-medium">Entrar</button>
                                <button onClick={() => setPage('register')} className="bg-white text-indigo-900 px-5 py-2 rounded-full font-bold">Cadastrar</button>
                            </div>
                        </nav>
                        <main className="flex-1 flex flex-col items-center justify-center text-center px-4">
                            <h1 className="text-6xl md:text-8xl font-black mb-6 bg-gradient-to-b from-white to-gray-500 bg-clip-text text-transparent italic">English Mastery.</h1>
                            <p className="text-gray-400 text-xl max-w-2xl mx-auto mb-10">Plataforma inteligente de gestão educacional para alunos e professores.</p>
                            <button onClick={() => setPage('register')} className="bg-indigo-600 hover:bg-indigo-500 px-10 py-4 rounded-2xl font-bold text-lg shadow-lg shadow-indigo-600/30">Matricule-se Agora</button>
                        </main>
                    </div>
                );
            }

            if (page === 'login' || page === 'register') {
                return (
                    <div className="min-h-screen bg-[#050507] flex items-center justify-center p-4">
                        <div className="w-full max-w-md bg-[#0f0f13] border border-white/5 p-10 rounded-[3rem] shadow-2xl">
                            <div className="text-center mb-10">
                                <h2 className="text-3xl font-black text-white mb-2">{page === 'login' ? 'Login' : 'Cadastro'}</h2>
                                <p className="text-gray-500 text-sm">Portal Académico New Winners</p>
                            </div>
                            {error && <div className="mb-4 p-3 bg-red-500/10 text-red-400 rounded-xl text-xs font-bold italic">{error}</div>}
                            {success && <div className="mb-4 p-3 bg-emerald-500/10 text-emerald-400 rounded-xl text-xs font-bold italic">{success}</div>}
                            <form onSubmit={page === 'login' ? handleLogin : handleRegister} className="space-y-4">
                                {page === 'register' && (
                                    <React.Fragment>
                                        <input type="text" required value={regName} onChange={(e) => setRegName(e.target.value)} className="w-full bg-black/40 border border-white/5 rounded-xl p-4 text-white outline-none" placeholder="Nome Completo" />
                                        <select value={regType} onChange={(e) => setRegType(e.target.value)} className="w-full bg-black/40 border border-white/5 rounded-xl p-4 text-white outline-none font-bold text-xs uppercase tracking-widest">
                                            <option value="ALUNO">Sou Aluno</option>
                                            <option value="PROFESSOR">Sou Professor</option>
                                        </select>
                                    </React.Fragment>
                                )}
                                <input type="email" required value={page === 'login' ? email : regEmail} onChange={(e) => page === 'login' ? setEmail(e.target.value) : setRegEmail(e.target.value)} className="w-full bg-black/40 border border-white/5 rounded-xl p-4 text-white outline-none" placeholder="Email" />
                                <input type="password" required value={page === 'login' ? password : regPass} onChange={(e) => page === 'login' ? setPassword(e.target.value) : setRegPass(e.target.value)} className="w-full bg-black/40 border border-white/5 rounded-xl p-4 text-white outline-none" placeholder="Senha" />
                                <button className="w-full bg-white text-black font-black py-4 rounded-xl hover:bg-indigo-50 transition-all uppercase text-xs tracking-[0.2em]">{page === 'login' ? 'Acessar' : 'Cadastrar'}</button>
                            </form>
                            <p className="mt-8 text-center text-gray-500 text-xs font-bold uppercase tracking-widest cursor-pointer" onClick={() => setPage(page === 'login' ? 'register' : 'login')}>
                                {page === 'login' ? "Criar nova conta" : "Já tenho conta"}
                            </p>
                            <button onClick={() => setPage('landing')} className="mt-4 w-full text-center text-gray-600 text-[10px] uppercase font-bold">Voltar ao Início</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex min-h-screen animate-fade-in">
                    <Sidebar />
                    <main className="flex-1 p-12 overflow-y-auto">
                        <header className="flex justify-between items-end mb-12">
                            <div>
                                <h2 className="text-gray-400 font-bold mb-1 uppercase text-[10px] tracking-[0.3em]">Sessão Ativa: {new Date().toLocaleDateString()}</h2>
                                <h1 className="text-4xl font-black text-indigo-900 tracking-tight italic">Portal {user?.type}</h1>
                            </div>
                            <div className="bg-white px-5 py-2 text-[10px] font-black uppercase text-gray-500 border border-gray-200 rounded-full">Status: <span className="text-emerald-500">Online</span></div>
                        </header>

                        {user?.type === 'ADMIN' && (
                            <div className="grid grid-cols-3 gap-8 mb-12">
                                <div className="bg-white p-8 rounded-[2rem] border border-gray-100 shadow-sm text-center">
                                    <h3 className="text-gray-400 text-xs font-bold uppercase mb-2">Utilizadores</h3>
                                    <p className="text-4xl font-black text-indigo-900">{database.length}</p>
                                </div>
                                <div className="bg-white p-8 rounded-[2rem] border border-gray-100 shadow-sm text-center col-span-2 overflow-x-auto">
                                    <table className="w-full text-left text-sm">
                                        <thead><tr className="text-gray-400 uppercase text-[10px] font-black tracking-widest"><th className="pb-4">Nome</th><th className="pb-4">Email</th><th className="pb-4">Tipo</th></tr></thead>
                                        <tbody className="text-gray-700 font-medium italic">
                                            {database.map(u => (
                                                <tr key={u.id} className="border-t border-gray-50"><td className="py-3">{u.name}</td><td className="py-3">{u.mail}</td><td className="py-3 text-indigo-600 font-bold">{u.type}</td></tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {user?.type === 'ALUNO' && (
                            <div className="bg-white p-10 rounded-[2.5rem] border border-gray-100 shadow-sm">
                                <h3 className="font-black text-indigo-900 text-2xl mb-6 italic">Bem-vindo de volta, {user?.name}!</h3>
                                <div className="grid grid-cols-2 gap-6">
                                    <div className="p-6 bg-indigo-50 rounded-3xl border border-indigo-100">
                                        <p className="text-indigo-600 font-bold text-xs uppercase mb-2">Nível Atual</p>
                                        <p className="text-2xl font-black text-indigo-900 tracking-tighter italic">Intermediate B2</p>
                                    </div>
                                    <div className="p-6 bg-blue-50 rounded-3xl border border-blue-100">
                                        <p className="text-blue-600 font-bold text-xs uppercase mb-2">Aulas Concluídas</p>
                                        <p className="text-2xl font-black text-blue-900 tracking-tighter italic">24 / 48</p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {user?.type === 'PROFESSOR' && (
                            <div className="bg-white p-10 rounded-[2.5rem] border border-gray-100 shadow-sm">
                                <h3 className="font-black text-indigo-900 text-2xl mb-6 italic">Painel do Docente</h3>
                                <p className="text-gray-500 font-medium italic">Selecione uma turma para gerir notas e presenças.</p>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
